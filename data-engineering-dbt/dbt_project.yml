name: contoso_dbt
version: '1.0.0'
config-version: 2

profile: contoso

model-paths: ["models"]
seed-paths:  ["seeds"]
test-paths:  ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  contoso_dbt:
    staging:
      +schema: staging          # objeto criado em: ContosoRetailDW.staging
      +materialized: view       # staging = view (leve, sempre atualizada)
    marts:
      +schema: marts            # objeto criado em: ContosoRetailDW.marts
      +materialized: table      # marts = table (persistida, rápida)
